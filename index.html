<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengumuman Kelulusan Siswa</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap"
        rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        brand: {
                            950: '#021812',
                            900: '#022c22',
                            800: '#064e3b',
                            700: '#047857',
                            600: '#059669',
                            500: '#10b981',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #021812;
            color: #e2e8f0;
        }

        .glass-dark {
            background: rgba(6, 78, 59, 0.15);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.2);
            box-shadow:
                0 10px 40px -10px rgba(0, 0, 0, 0.7),
                inset 0 0 20px rgba(16, 185, 129, 0.05);
        }

        .glass-input {
            background: rgba(2, 44, 34, 0.4);
            border: 1px solid rgba(16, 185, 129, 0.2);
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            background: rgba(6, 78, 59, 0.5);
            border-color: rgba(16, 185, 129, 0.6);
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15);
        }

        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-left-color: #10b981;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-brand-950 px-6">

    <!-- AUDIO -->
    <audio id="audioSuccess" src="lulus.mp3" preload="auto"></audio>
    <audio id="audioFail" src="waiting.mp3" preload="auto"></audio>

    <!-- MAIN -->
    <main class="w-full max-w-4xl text-center">

        <!-- LOGO -->
        <div class="mb-8 flex justify-center">
            <div class="bg-white px-8 py-3 rounded-2xl shadow-xl">
                <img src="logo.png" alt="Logo Sekolah" class="h-16 object-contain">
            </div>
        </div>

        <!-- TITLE -->
        <h1 class="font-serif text-4xl md:text-6xl font-bold text-white mb-4">
            Pengumuman Kelulusan
        </h1>

        <p class="text-brand-500 uppercase tracking-[0.3em] mb-12">
            Tahun Ajaran 2025/2026
        </p>

        <!-- COUNTDOWN -->
        <div id="countdownArea" class="flex justify-center gap-6 mb-12">

            <div class="flex flex-col items-center">
                <div class="glass-dark w-24 h-24 rounded-2xl flex items-center justify-center text-5xl text-white">
                    00
                </div>
                <span class="mt-3 text-brand-500 uppercase text-sm">
                    Jam
                </span>
            </div>

            <div class="text-4xl text-brand-700 mt-6">:</div>

            <div class="flex flex-col items-center">
                <div class="glass-dark w-24 h-24 rounded-2xl flex items-center justify-center text-5xl text-white">
                    00
                </div>
                <span class="mt-3 text-brand-500 uppercase text-sm">
                    Menit
                </span>
            </div>

            <div class="text-4xl text-brand-700 mt-6">:</div>

            <div class="flex flex-col items-center">
                <div id="secDisplay"
                    class="glass-dark border border-brand-500 w-24 h-24 rounded-2xl flex items-center justify-center text-5xl text-brand-500">
                    10
                </div>
                <span class="mt-3 text-brand-500 uppercase text-sm">
                    Detik
                </span>
            </div>

        </div>

        <!-- FORM -->
        <div id="formArea" class="hidden max-w-md mx-auto">

            <div class="glass-dark rounded-3xl p-8">

                <h2 class="text-2xl text-white font-bold mb-6">
                    Cek Kelulusan
                </h2>

                <form onsubmit="event.preventDefault(); checkGraduation();">

                    <input type="text" id="participantInput" placeholder="Masukkan Nomor Peserta"
                        class="glass-input w-full px-5 py-4 rounded-xl text-white outline-none mb-6">

                    <button type="submit" id="checkBtn"
                        class="w-full bg-brand-600 hover:bg-brand-500 text-white py-4 rounded-xl font-semibold flex justify-center items-center">

                        <span id="btnText">
                            Cek Kelulusan
                        </span>

                        <div id="btnLoader" class="spinner ml-3 hidden"></div>

                    </button>

                </form>
            </div>
        </div>

    </main>

    <!-- RESULT MODAL -->
    <div id="resultModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">

        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeModal('resultModal')"></div>

        <div id="modalBox"
            class="relative glass-dark rounded-3xl w-full max-w-2xl p-8 opacity-0 translate-y-8 transition-all duration-300">

            <div class="flex justify-between items-start mb-8">

                <div>
                    <h4 class="text-brand-500 mb-2">
                        Hasil Kelulusan
                    </h4>

                    <h2 id="modalName" class="text-4xl text-white font-bold mb-2">
                        Nama Siswa
                    </h2>

                    <div class="text-gray-400 flex gap-4">
                        <span id="modalNo">2026001</span>
                        <span id="modalClass">XI A</span>
                    </div>
                </div>

                <div id="statusBadge" class="bg-brand-500/20 text-brand-400 px-5 py-3 rounded-xl font-bold uppercase">
                    LULUS
                </div>

            </div>

            <!-- SCORES -->
            <div class="grid grid-cols-2 gap-4 mb-8">

                <div class="glass-dark p-4 rounded-xl flex justify-between">
                    <span>Bahasa Indonesia</span>
                    <span id="indoScore">0</span>
                </div>

                <div class="glass-dark p-4 rounded-xl flex justify-between">
                    <span>Matematika</span>
                    <span id="mathScore">0</span>
                </div>

                <div class="glass-dark p-4 rounded-xl flex justify-between">
                    <span>IPA</span>
                    <span id="ipaScore">0</span>
                </div>

                <div class="glass-dark p-4 rounded-xl flex justify-between">
                    <span>Bahasa Inggris</span>
                    <span id="engScore">0</span>
                </div>

            </div>

            <!-- AVERAGE -->
            <div class="glass-dark p-5 rounded-xl flex justify-between mb-8">

                <span>Nilai Rata-Rata</span>

                <span id="averageScore" class="text-3xl font-bold text-brand-400">
                    0
                </span>

            </div>

            <button onclick="closeModal('resultModal')"
                class="w-full bg-white/10 hover:bg-white/20 text-white py-4 rounded-xl">
                Tutup
            </button>

        </div>
    </div>

    <!-- ERROR MODAL -->
    <div id="errorModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4">

        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" onclick="closeErrorModal()"></div>

        <div id="errorBox"
            class="relative glass-dark rounded-3xl w-full max-w-md p-8 border border-red-500/20 opacity-0 scale-90 transition-all duration-300">

            <div class="text-center">

                <div class="w-24 h-24 mx-auto rounded-full bg-red-500/10 flex items-center justify-center mb-6">

                    <svg class="w-12 h-12 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M6 18L18 6M6 6l12 12">
                        </path>

                    </svg>
                </div>

                <h2 class="text-3xl font-bold text-white mb-4">
                    Data Tidak Ditemukan
                </h2>

                <p class="text-gray-400 mb-8">
                    Nomor peserta yang Anda masukkan tidak tersedia di sistem.
                </p>

                <button onclick="closeErrorModal()"
                    class="bg-red-500 hover:bg-red-600 text-white px-8 py-3 rounded-xl font-semibold">
                    Tutup
                </button>

            </div>
        </div>
    </div>

    <script>

        // COUNTDOWN
        let timeLeft = 10;

        const secDisplay =
            document.getElementById('secDisplay');

        const countdownArea =
            document.getElementById('countdownArea');

        const formArea =
            document.getElementById('formArea');

        const timer = setInterval(() => {

            timeLeft--;

            secDisplay.textContent =
                timeLeft < 10 ? '0' + timeLeft : timeLeft;

            if (timeLeft <= 0) {

                clearInterval(timer);

                countdownArea.style.display = 'none';

                formArea.classList.remove('hidden');
            }

        }, 1000);


        // LOAD JSON
        let studentsData = [];

        async function loadStudents() {

            try {

                const response =
                    await fetch('students.json');

                studentsData =
                    await response.json();

            } catch (error) {

                console.error(error);

            }
        }

        loadStudents();


        // CHECK GRADUATION
        async function checkGraduation() {

            const participantNo =
                document.getElementById('participantInput')
                    .value
                    .trim();

            const submitBtn =
                document.getElementById('checkBtn');

            const btnText =
                document.getElementById('btnText');

            const btnLoader =
                document.getElementById('btnLoader');

            // Loading
            btnText.textContent = 'Memproses...';

            btnLoader.classList.remove('hidden');

            submitBtn.disabled = true;

            setTimeout(() => {

                const student =
                    studentsData.find(
                        s => s.id === participantNo
                    );

                // Reset
                btnText.textContent =
                    'Cek Kelulusan';

                btnLoader.classList.add('hidden');

                submitBtn.disabled = false;

                // FOUND
                if (student) {

                    document.getElementById('modalName')
                        .textContent =
                        student.name;

                    document.getElementById('modalNo')
                        .textContent =
                        student.id;

                    document.getElementById('modalClass')
                        .textContent =
                        student.class;

                    document.getElementById('indoScore')
                        .textContent =
                        student.scores["Bahasa Indonesia"] || '-';

                    document.getElementById('mathScore')
                        .textContent =
                        student.scores["Matematika"] || '-';

                    document.getElementById('ipaScore')
                        .textContent =
                        student.scores["IPA"] || '-';

                    document.getElementById('engScore')
                        .textContent =
                        student.scores["Bahasa Inggris"] || '-';

                    // Average
                    const values =
                        Object.values(student.scores);

                    const average =
                        values.reduce((a, b) => a + b, 0)
                        / values.length;

                    document.getElementById('averageScore')
                        .textContent =
                        average.toFixed(2);

                    const badge =
                        document.getElementById('statusBadge');

                    // STATUS
                    if (student.status.toLowerCase() === 'lulus') {

                        badge.textContent = 'LULUS';

                        badge.className =
                            'bg-brand-500/20 text-brand-400 px-5 py-3 rounded-xl font-bold uppercase';

                        document.getElementById('audioSuccess')
                            .play()
                            .catch(e => { });

                    } else {

                        badge.textContent = 'TIDAK LULUS';

                        badge.className =
                            'bg-red-500/20 text-red-400 px-5 py-3 rounded-xl font-bold uppercase';

                        document.getElementById('audioFail')
                            .play()
                            .catch(e => { });
                    }

                    openResultModal();

                } else {

                    document.getElementById('audioFail')
                        .play()
                        .catch(e => { });

                    openErrorModal();
                }

            }, 1200);
        }


        // OPEN RESULT MODAL
        function openResultModal() {

            const modal =
                document.getElementById('resultModal');

            const box =
                document.getElementById('modalBox');

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            setTimeout(() => {

                box.classList.remove(
                    'opacity-0',
                    'translate-y-8'
                );

                box.classList.add(
                    'opacity-100',
                    'translate-y-0'
                );

            }, 10);
        }


        // CLOSE RESULT MODAL
        function closeModal(modalId) {

            const modal =
                document.getElementById(modalId);

            const box =
                document.getElementById('modalBox');

            box.classList.remove(
                'opacity-100',
                'translate-y-0'
            );

            box.classList.add(
                'opacity-0',
                'translate-y-8'
            );

            setTimeout(() => {

                modal.classList.add('hidden');

            }, 300);
        }


        // OPEN ERROR MODAL
        function openErrorModal() {

            const modal =
                document.getElementById('errorModal');

            const box =
                document.getElementById('errorBox');

            modal.classList.remove('hidden');
            modal.classList.add('flex');

            setTimeout(() => {

                box.classList.remove(
                    'opacity-0',
                    'scale-90'
                );

                box.classList.add(
                    'opacity-100',
                    'scale-100'
                );

            }, 10);
        }


        // CLOSE ERROR MODAL
        function closeErrorModal() {

            const modal =
                document.getElementById('errorModal');

            const box =
                document.getElementById('errorBox');

            box.classList.remove(
                'opacity-100',
                'scale-100'
            );

            box.classList.add(
                'opacity-0',
                'scale-90'
            );

            setTimeout(() => {

                modal.classList.add('hidden');

            }, 300);
        }

    </script>

</body>

</html>
